project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "course1_foundations/**/*.qmd"
    - "course2_regression/**/*.qmd"
    - "course3_design_causal/**/*.qmd"
    - "course4_ml_highdim/**/*.qmd"
    - "appendices/**/*.qmd"

execute:
  freeze: auto

website:
  title: "biostats_courses"
  description: "A four-course biostatistics programme in R and Quarto."
  site-url: "https://r-heller.github.io/courses/"
  navbar:
    background: light
    title: "biostats_courses"
    left:
      - href: course1_foundations/index.qmd
        text: "Course 1"
      - href: course2_regression/index.qmd
        text: "Course 2"
      - href: course3_design_causal/index.qmd
        text: "Course 3"
      - href: course4_ml_highdim/index.qmd
        text: "Course 4"
      - href: about.qmd
        text: "About"
    right:
      - icon: github
        href: https://github.com/r-heller/courses
  page-navigation: true
  page-footer:
    left: "Biostatistics Courses · MIT"
    center: |
      [Get Started](get_started.qmd) · [Schedule](schedule.qmd) ·
      [Interactive apps](shiny.qmd) ·
      [Research workflow](appendices/research_workflow.qmd) ·
      [Decision tree](appendices/decision_tree.qmd) ·
      [Glossary](appendices/glossary.qmd) ·
      [Common errors](appendices/common_errors.qmd) ·
      [Writing a report](appendices/writing_a_report.qmd) ·
      [References](references.qmd)
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: [flatly, custom.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

editor: source
